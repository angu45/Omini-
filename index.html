<script>
    const modelImg = document.getElementById('cameraman-model');
    const images = [
        "https://i.ibb.co/nq9hSPWN/1000175970.png",
        "https://i.ibb.co/ZpZ092p7/1000175967.png",
        "https://i.ibb.co/Rpg77v6z/1000175969.png",
        "https://i.ibb.co/TBKpwQMK/1000175968.png"
    ];

    let currentIndex = 0;

    function flipAndChange() {
        if (!modelImg) return;
        modelImg.style.transform = "rotateY(90deg) scale(0.9)";
        modelImg.style.opacity = "0";

        setTimeout(() => {
            currentIndex = (currentIndex + 1) % images.length;
            modelImg.src = images[currentIndex];
            modelImg.style.transform = "rotateY(0deg) scale(1)";
            modelImg.style.opacity = "1";
        }, 600);
    }
    setInterval(flipAndChange, 5000);
</script>
