<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Omii Cinematic | 3D Portfolio</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@700;900&display=swap');

        :root {
            --text-outline: rgba(255, 255, 255, 0.6);
            --shadow-color: rgba(0, 0, 0, 0.8);
            --footer-text: #ffffff;
        }

        body.light-mode {
            --text-outline: rgba(0, 0, 0, 0.3);
            --shadow-color: rgba(0, 0, 0, 0.1);
            --footer-text: #333333;
        }

        body {
            margin: 0;
            background-color: #000;
            font-family: 'Poppins', sans-serif;
            overflow-x: hidden;
        }

        .slider-section {
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            background: transparent;
        }

        /* 3D Slider Area */
        .banner {
            width: 100%;
            height: 100%;
            position: relative;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .slider {
            position: absolute;
            width: 180px;
            height: 250px;
            top: 15%;
            transform-style: preserve-3d;
            transform: perspective(1000px) rotateX(-12deg);
            animation: autoRun 25s linear infinite;
            z-index: 2;
        }

        @keyframes autoRun {
            from { transform: perspective(1000px) rotateX(-12deg) rotateY(0deg); }
            to { transform: perspective(1000px) rotateX(-12deg) rotateY(360deg); }
        }

        .item {
            position: absolute;
            inset: 0;
            transform: rotateY(calc((var(--p) - 1) * (360 / var(--q)) * 1deg)) translateZ(500px);
        }

        .item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 12px;
            box-shadow: 0 10px 25px var(--shadow-color);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* Center Content - Cameraman and Text */
        .content-layer {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            pointer-events: none;
        }

        .content-layer h1 {
            font-size: 10vw;
            color: transparent;
            -webkit-text-stroke: 1.5px var(--text-outline);
            margin: 0;
            z-index: 1;
            text-transform: uppercase;
        }

        .model-img {
            position: absolute;
            bottom: 0;
            height: 75%;
            z-index: 5;
            filter: drop-shadow(0 0 30px var(--shadow-color));
            /* Animation Transition */
            transition: transform 0.5s ease-in-out, opacity 0.5s ease-in-out;
            transform-style: preserve-3d;
            backface-visibility: hidden;
        }

        .slider-author {
            position: absolute;
            bottom: 30px;
            width: 90%;
            display: flex;
            justify-content: space-between;
            color: var(--footer-text);
            padding: 0 5%;
        }

        .slider-author h3 { margin: 0; font-size: 1.2rem; letter-spacing: 2px; }
        .slider-author p { margin: 0; opacity: 0.6; font-size: 0.7rem; }
    </style>
</head>
<body>

<section class="slider-section">
    <div class="banner">
        
        <div class="slider" style="--q: 10;">
            <div class="item" style="--p: 1;"><img src="https://images.unsplash.com/photo-1506744038136-46273834b3fb?w=400&h=600&fit=crop"></div>
            <div class="item" style="--p: 2;"><img src="https://images.unsplash.com/photo-1470770841072-f978cf4d019e?w=400&h=600&fit=crop"></div>
            <div class="item" style="--p: 3;"><img src="https://images.unsplash.com/photo-1441974231531-c6227db76b6e?w=400&h=600&fit=crop"></div>
            <div class="item" style="--p: 4;"><img src="https://images.unsplash.com/photo-1501785888041-af3ef285b470?w=400&h=600&fit=crop"></div>
            <div class="item" style="--p: 5;"><img src="https://images.unsplash.com/photo-1447752875215-b2761acb3c5d?w=400&h=600&fit=crop"></div>
            <div class="item" style="--p: 6;"><img src="https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?w=400&h=600&fit=crop"></div>
            <div class="item" style="--p: 7;"><img src="https://images.unsplash.com/photo-1472214103451-9374bd1c798e?w=400&h=600&fit=crop"></div>
            <div class="item" style="--p: 8;"><img src="https://images.unsplash.com/photo-1500622344773-5144bc48e7a2?w=400&h=600&fit=crop"></div>
            <div class="item" style="--p: 9;"><img src="https://images.unsplash.com/photo-1433086566503-6714a55906b3?w=400&h=600&fit=crop"></div>
            <div class="item" style="--p: 10;"><img src="https://images.unsplash.com/photo-1419242902214-272b3f66ee7a?w=400&h=600&fit=crop"></div>
        </div>

        <div class="content-layer">
            <h1>OMINICINEMATICS</h1>
            
            <img src="https://i.ibb.co/nq9hSPWN/1000175970.png" 
                 id="cameraman-model" 
                 class="model-img" 
                 alt="Cameraman">

            <div class="slider-author">
                <div>
                    <p>Editor & Vlogger</p>
                    <h3>OMII CINEMATIC</h3>
                </div>
                <div>
                    <p>Production City</p>
                    <h3>PARBHANI</h3>
                </div>
            </div>
        </div>
    </div>
</section>

<script>
    const modelImg = document.getElementById('cameraman-model');
    
    // Direct Links to the images you uploaded
    const images = [
        "https://i.ibb.co/nq9hSPWN/1000175970.png",
        "https://i.ibb.co/ZpZ092p7/1000175967.png",
        "https://i.ibb.co/Rpg77v6z/1000175969.png",
        "https://i.ibb.co/TBKpwQMK/1000175968.png"
    ];

    let currentIndex = 0;

    function flipAndChange() {
        if (!modelImg) return;
        
        // 1. Start the flip out
        modelImg.style.transform = "rotateY(90deg)";
        modelImg.style.opacity = "0";

        setTimeout(() => {
            // 2. Change the source while hidden
            currentIndex = (currentIndex + 1) % images.length;
            modelImg.src = images[currentIndex];

            // 3. Flip back in
            modelImg.style.transform = "rotateY(0deg)";
            modelImg.style.opacity = "1";
        }, 500); 
    }

    // Interval set to 4 seconds
    setInterval(flipAndChange, 4000);
</script>

</body>
</html>
